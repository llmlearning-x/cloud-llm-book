[book]
title = "云上大模型应用开发实践"
authors = ["方华"]
language = "zh"
description = "以阿里云为主要平台，带领零基础读者从入门到实战，系统掌握云上大模型应用开发技能"
src = "src"

[build]
build-dir = "book"

[output.html]
theme = "default"
footer = true

[output.html.print]
enable = true
page-break = true

[output.html.search]
enable = true

[output.html.table-of-contents]
enable = true

[output.html.git-repository]
enable = true
url = "https://github.com/your-username/cloud-llm-book"
